<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="pin" x1="5" y1="1" x2="27" y2="30" gradientUnits="userSpaceOnUse">
      <stop stop-color="#b078ff"/>
      <stop offset="1" stop-color="#6d17e8"/>
    </linearGradient>
    <clipPath id="frame">
      <rect x="8.5" y="6.5" width="15" height="11" rx="2"/>
    </clipPath>
  </defs>

  <!-- Map pin -->
  <path d="M16 1C9.925 1 5 5.925 5 12c0 7.75 11 19 11 19S27 19.75 27 12C27 5.925 22.075 1 16 1z" fill="url(#pin)"/>

  <!-- Photo frame background -->
  <rect x="8.5" y="6.5" width="15" height="11" rx="2" fill="white"/>

  <!-- Photo scene (clipped) -->
  <g clip-path="url(#frame)">
    <rect x="8.5" y="6.5" width="15" height="11" fill="#ede9fe"/>
    <!-- Mountains -->
    <path d="M8.5 17.5l3.5-4.5 3 3.5 2.5-3.5 6 4.5z" fill="#8b5cf6"/>
    <!-- Sun -->
    <circle cx="20.5" cy="8.8" r="1.6" fill="#f59e0b"/>
  </g>

  <!-- Frame border -->
  <rect x="8.5" y="6.5" width="15" height="11" rx="2" stroke="white" stroke-width="0.75" stroke-opacity="0.4" fill="none"/>
</svg>
